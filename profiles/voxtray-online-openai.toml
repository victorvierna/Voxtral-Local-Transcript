model_id = "mistralai/Voxtral-Mini-4B-Realtime-2602"

[transcription]
provider = "openai_realtime"

[server]
host = "127.0.0.1"
port = 8000
start_timeout_seconds = 180
external_base_url = ""

[audio]
device = "default"
sample_rate = 24000
chunk_ms = 40

[history]
max_items = 5

[clipboard]
backend = "auto"

[postprocess]
clean_text = true

[realtime]
final_timeout_seconds = 12.0
segment_max_seconds = 120
segment_finalize_timeout_seconds = 12.0
mic_queue_chunks = 4096
stop_tail_ms = 280
first_chunk_grace_ms = 220

[mistral_realtime]
api_key_env = "MISTRAL_API_KEY"
model = "voxtral-mini-transcribe-realtime-2602"
sample_rate = 16000
target_delay_ms = 480

[openai_realtime]
api_key_env = "OPENAI_API_KEY"
model = "gpt-realtime-whisper"
fallback_model = "whisper-1"
sample_rate = 24000
turn_detection = "manual"
delay = "high"
language = "es"
prompt = "Transcribe literalmente comandos de voz en español. Conserva los nombres de proyecto mencionados por la persona. No añadas palabras de activación si no se han dicho claramente."

[engine]
command = "vllm"
enforce_eager = false
disable_compile_cache = true
compilation_config = "{\"cudagraph_mode\":\"PIECEWISE\"}"
extra_args = ["--trust-remote-code"]
